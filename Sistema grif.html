<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Auto Joiner - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4a3b8c 0%, #5a4a9c 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
            font-weight: 400;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
            padding: 20px;
            background: #f0f0f0;
        }

        .stat-card {
            background: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            margin: 0 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .stat-card h3 {
            color: #666;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .stat-card .number {
            color: #333;
            font-size: 32px;
            font-weight: 600;
        }

        .api-section {
            background: #2c3e50;
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .api-section span:first-child {
            background: #34495e;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 500;
        }

        .api-section span:nth-child(2) {
            color: #ecf0f1;
            font-weight: 500;
        }

        .api-section small {
            color: #95a5a6;
            font-size: 12px;
            margin-left: auto;
        }

        .add-user-section {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }

        .add-user-title {
            color: #495057;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .add-user-form {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .add-user-form input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
            background: white;
        }

        .add-user-form input:focus {
            outline: none;
            border-color: #4a3b8c;
        }

        .add-user-form input::placeholder {
            color: #6c757d;
            font-style: italic;
        }

        .btn-add {
            background: #4a3b8c;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s;
        }

        .btn-add:hover {
            background: #5a4a9c;
        }

        .search-section {
            padding: 15px 20px;
            background: white;
            display: flex;
            gap: 15px;
            align-items: center;
            border-bottom: 1px solid #dee2e6;
        }

        .search-box {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
            background: white;
        }

        .search-box:focus {
            outline: none;
            border-color: #4a3b8c;
        }

        .search-box::placeholder {
            color: #6c757d;
            font-style: italic;
        }

        .filter-buttons {
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            padding: 8px 20px;
            border: 1px solid #ced4da;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #495057;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: #e9ecef;
        }

        .filter-btn.active {
            background: #4a3b8c;
            color: white;
            border-color: #4a3b8c;
        }

        .users-table-section {
            padding: 20px;
            background: white;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .users-table th {
            background: #f8f9fa;
            padding: 12px 15px;
            text-align: left;
            color: #495057;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #dee2e6;
        }

        .users-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #e9ecef;
            color: #212529;
        }

        .users-table tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            display: inline-block;
        }

        .status-whitelist {
            background: #d1e7dd;
            color: #0a3622;
        }

        .status-blocked {
            background: #f8d7da;
            color: #842029;
        }

        .action-btn {
            padding: 5px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            margin-right: 5px;
            transition: background 0.2s;
        }

        .btn-block, .btn-unblock {
            background: #ffc107;
            color: #000;
        }

        .btn-block:hover, .btn-unblock:hover {
            background: #ffca2c;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #bb2d3b;
        }

        .error-message {
            background: #f8d7da;
            color: #842029;
            padding: 12px 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            border-top: 1px solid #f5c2c7;
        }

        .loading, .no-users {
            text-align: center;
            padding: 40px;
            color: #6c757d;
            font-size: 14px;
        }

        .api-url {
            color: #95a5a6;
            font-size: 12px;
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>USER AUTO JOINER</h1>
            <p>PAINEL DE ADMINISTRAÇÃO · WHITELIST MANAGER</p>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <h3>TOTAL USERS</h3>
                <div class="number" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <h3>WHITELISTED</h3>
                <div class="number" id="whitelistedCount">0</div>
            </div>
            <div class="stat-card">
                <h3>BLOCKED</h3>
                <div class="number" id="blockedCount">0</div>
            </div>
        </div>

        <div class="api-section">
            <span>API ENDPOINT</span>
            <span>GET /users</span>
            <span class="api-url">https://sistema-grife-api312-default-rtdb.firebaseio.com/</span>
        </div>

        <div class="add-user-section">
            <div class="add-user-title">ADICIONAR USUÁRIO</div>
            <div class="add-user-form">
                <input type="text" id="usernameInput" placeholder="Nome do usuário Roblox...">
                <button class="btn-add" onclick="addUser()">ADICIONAR</button>
            </div>
        </div>

        <div class="search-section">
            <input type="text" class="search-box" id="searchInput" placeholder="Buscar usuário..." onkeyup="filterUsers()">
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterByStatus('todos', event)">Todos</button>
                <button class="filter-btn" onclick="filterByStatus('whitelist', event)">Whitelist</button>
                <button class="filter-btn" onclick="filterByStatus('bloqueados', event)">Bloqueados</button>
            </div>
        </div>

        <div class="users-table-section">
            <table class="users-table" id="usersTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>USUÁRIO</th>
                        <th>REGISTRADO EM</th>
                        <th>STATUS</th>
                        <th>AÇÕES</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr>
                        <td colspan="5" class="loading">Carregando usuários...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="error-message" id="errorMessage">
            ERROR AO CONECTAR COM O SERVIDOR
        </div>
    </div>

    <script>
        const API_URL = 'https://sistema-grife-api312-default-rtdb.firebaseio.com/users.json';
        let users = [];
        let currentFilter = 'todos';
        let searchTerm = '';

        document.addEventListener('DOMContentLoaded', loadUsers);

        async function loadUsers() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                users = data ? Object.keys(data).map(key => ({
                    id: key,
                    ...data[key]
                })) : [];
                
                users.sort((a, b) => {
                    if (a.timestamp && b.timestamp) {
                        return new Date(b.timestamp) - new Date(a.timestamp);
                    }
                    return 0;
                });
                
                updateUI();
                document.getElementById('errorMessage').style.display = 'none';
            } catch (error) {
                console.error('Erro ao carregar usuários:', error);
                document.getElementById('errorMessage').style.display = 'block';
                showLoading(false);
            }
        }

        async function addUser() {
            const usernameInput = document.getElementById('usernameInput');
            const username = usernameInput.value.trim();
            
            if (!username) {
                alert('Por favor, insira um nome de usuário');
                return;
            }

            if (users.some(u => u.username.toLowerCase() === username.toLowerCase())) {
                alert('Este usuário já está cadastrado!');
                return;
            }

            const newUser = {
                username: username,
                date: new Date().toLocaleDateString('pt-BR'),
                status: 'whitelist',
                timestamp: new Date().toISOString()
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(newUser)
                });

                if (response.ok) {
                    usernameInput.value = '';
                    await loadUsers();
                } else {
                    throw new Error('Falha ao adicionar usuário');
                }
            } catch (error) {
                console.error('Erro ao adicionar usuário:', error);
                alert('Erro ao adicionar usuário. Tente novamente.');
            }
        }

        async function toggleUserStatus(userId, currentStatus) {
            const newStatus = currentStatus === 'whitelist' ? 'blocked' : 'whitelist';
            
            try {
                const response = await fetch(`https://sistema-grife-api312-default-rtdb.firebaseio.com/users/${userId}.json`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                if (response.ok) {
                    await loadUsers();
                } else {
                    throw new Error('Falha ao atualizar usuário');
                }
            } catch (error) {
                console.error('Erro ao atualizar usuário:', error);
                alert('Erro ao atualizar usuário. Tente novamente.');
            }
        }

        async function deleteUser(userId) {
            if (!confirm('Tem certeza que deseja deletar este usuário?')) {
                return;
            }

            try {
                const response = await fetch(`https://sistema-grife-api312-default-rtdb.firebaseio.com/users/${userId}.json`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    await loadUsers();
                } else {
                    throw new Error('Falha ao deletar usuário');
                }
            } catch (error) {
                console.error('Erro ao deletar usuário:', error);
                alert('Erro ao deletar usuário. Tente novamente.');
            }
        }

        function filterUsers() {
            searchTerm = document.getElementById('searchInput').value.toLowerCase();
            applyFilters();
        }

        function filterByStatus(status, event) {
            currentFilter = status;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            applyFilters();
        }

        function applyFilters() {
            let filteredUsers = users;

            if (currentFilter === 'whitelist') {
                filteredUsers = filteredUsers.filter(u => u.status === 'whitelist');
            } else if (currentFilter === 'bloqueados') {
                filteredUsers = filteredUsers.filter(u => u.status === 'blocked');
            }

            if (searchTerm) {
                filteredUsers = filteredUsers.filter(u => 
                    u.username.toLowerCase().includes(searchTerm)
                );
            }

            displayUsers(filteredUsers);
            updateStats();
        }

        function displayUsers(usersToDisplay) {
            const tbody = document.getElementById('usersTableBody');
            
            if (usersToDisplay.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="no-users">Nenhum usuário encontrado</td></tr>';
                return;
            }

            tbody.innerHTML = usersToDisplay.map((user, index) => {
                const isBlocked = user.status === 'blocked';
                return `
                <tr>
                    <td>${String(index + 1).padStart(2, '0')}</td>
                    <td>${user.username}</td>
                    <td>${user.date || '08/03/2026'}</td>
                    <td>
                        <span class="status-badge ${isBlocked ? 'status-blocked' : 'status-whitelist'}">
                            ${isBlocked ? 'BLOQUEADO' : 'WHITELIST'}
                        </span>
                    </td>
                    <td>
                        <button class="action-btn ${isBlocked ? 'btn-unblock' : 'btn-block'}" 
                                onclick="toggleUserStatus('${user.id}', '${user.status}')">
                            ${isBlocked ? 'DESBLOQUEAR' : 'BLOQUEAR'}
                        </button>
                        <button class="action-btn btn-delete" onclick="deleteUser('${user.id}')">
                            DEL
                        </button>
                    </td>
                </tr>
            `}).join('');
        }

        function updateStats() {
            const totalUsers = users.length;
            const whitelisted = users.filter(u => u.status === 'whitelist').length;
            const blocked = users.filter(u => u.status === 'blocked').length;

            document.getElementById('totalUsers').textContent = totalUsers;
            document.getElementById('whitelistedCount').textContent = whitelisted;
            document.getElementById('blockedCount').textContent = blocked;
        }

        function updateUI() {
            applyFilters();
        }

        function showLoading(isLoading) {
            const tbody = document.getElementById('usersTableBody');
            if (isLoading) {
                tbody.innerHTML = '<tr><td colspan="5" class="loading">Carregando usuários...</td></tr>';
            }
        }

        // Exemplo inicial para mostrar como fica
        setTimeout(() => {
            if (users.length === 0) {
                const tbody = document.getElementById('usersTableBody');
                tbody.innerHTML = `
                    <tr>
                        <td>01</td>
                        <td>MahoganyShari1</td>
                        <td>08/03/2026</td>
                        <td><span class="status-badge status-whitelist">WHITELIST</span></td>
                        <td>
                            <button class="action-btn btn-block" onclick="alert('Função disponível após conectar ao Firebase')">BLOQUEAR</button>
                            <button class="action-btn btn-delete" onclick="alert('Função disponível após conectar ao Firebase')">DEL</button>
                        </td>
                    </tr>
                `;
            }
        }, 1000);
    </script>
</body>
</html>
