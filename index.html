<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Auto Joiner — Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --blue: #00c3ff; --blue-dim: #0080aa; --blue-glow: rgba(0,195,255,0.35);
      --bg: #060b14; --surface: #0a1220; --surface2: #0f1c2e;
      --border: rgba(0,195,255,0.18); --text: #c8e6f5; --text-dim: #4a7a99;
      --green: #00ffaa; --red: #ff4466;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); font-family:'Rajdhani',sans-serif; color:var(--text); min-height:100vh; overflow-x:hidden; }
    body::before {
      content:''; position:fixed; inset:0;
      background-image: linear-gradient(rgba(0,195,255,0.04) 1px,transparent 1px), linear-gradient(90deg,rgba(0,195,255,0.04) 1px,transparent 1px);
      background-size:40px 40px; pointer-events:none; z-index:0;
    }
    body::after {
      content:''; position:fixed; top:-200px; left:50%; transform:translateX(-50%);
      width:800px; height:400px;
      background:radial-gradient(ellipse,rgba(0,195,255,0.12) 0%,transparent 70%);
      pointer-events:none; z-index:0;
    }
    .container { position:relative; z-index:1; max-width:1000px; margin:0 auto; padding:40px 20px; }
    header { text-align:center; margin-bottom:50px; }
    .logo {
      font-family:'Orbitron',monospace; font-size:clamp(22px,5vw,38px); font-weight:900;
      letter-spacing:6px; text-transform:uppercase; color:var(--blue);
      text-shadow:0 0 20px var(--blue-glow),0 0 60px rgba(0,195,255,0.15);
      animation:pulse 3s ease-in-out infinite;
    }
    .logo span { color:#fff; text-shadow:0 0 20px rgba(255,255,255,0.3); }
    @keyframes pulse {
      0%,100% { text-shadow:0 0 20px var(--blue-glow),0 0 60px rgba(0,195,255,0.15); }
      50%      { text-shadow:0 0 30px rgba(0,195,255,0.6),0 0 80px rgba(0,195,255,0.25); }
    }
    .subtitle { font-size:13px; letter-spacing:4px; color:var(--text-dim); margin-top:8px; text-transform:uppercase; }
    .divider  { width:200px; height:1px; background:linear-gradient(90deg,transparent,var(--blue),transparent); margin:20px auto 0; }

    .stats { display:flex; gap:16px; justify-content:center; margin-bottom:36px; flex-wrap:wrap; }
    .stat-card {
      background:var(--surface); border:1px solid var(--border); border-radius:8px;
      padding:14px 28px; text-align:center; min-width:130px; position:relative; overflow:hidden;
    }
    .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--blue),transparent); }
    .stat-num { font-family:'Orbitron',monospace; font-size:28px; font-weight:700; color:var(--blue); }
    .stat-num.green { color:var(--green); } .stat-num.red { color:var(--red); }
    .stat-label { font-size:11px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; margin-top:2px; }

    .add-section {
      background:var(--surface); border:1px solid var(--border); border-radius:12px;
      padding:24px; margin-bottom:28px; display:flex; gap:12px; align-items:center; flex-wrap:wrap;
    }
    .add-section input {
      flex:1; min-width:200px; background:var(--bg); border:1px solid var(--border);
      border-radius:7px; padding:12px 16px; color:var(--text);
      font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:600; letter-spacing:1px;
      outline:none; transition:border-color .2s,box-shadow .2s;
    }
    .add-section input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(0,195,255,0.1); }
    .add-section input::placeholder { color:var(--text-dim); }

    .btn {
      padding:12px 24px; border-radius:7px; border:none;
      font-family:'Orbitron',monospace; font-size:11px; font-weight:700;
      letter-spacing:2px; cursor:pointer; text-transform:uppercase; transition:all .2s; white-space:nowrap;
    }
    .btn-primary { background:var(--blue); color:#000; box-shadow:0 0 20px rgba(0,195,255,0.3); }
    .btn-primary:hover { background:#33d4ff; box-shadow:0 0 30px rgba(0,195,255,0.5); transform:translateY(-1px); }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .btn-danger  { background:transparent; color:var(--red); border:1px solid var(--red); padding:7px 14px; font-size:10px; }
    .btn-danger:hover  { background:var(--red); color:#fff; }
    .btn-toggle  { background:transparent; color:var(--green); border:1px solid var(--green); padding:7px 14px; font-size:10px; }
    .btn-toggle:hover  { background:var(--green); color:#000; }
    .btn-toggle.blocked { color:var(--text-dim); border-color:var(--text-dim); }
    .btn-toggle.blocked:hover { background:var(--text-dim); color:#000; }

    .filter-bar { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; align-items:center; }
    .filter-bar input {
      flex:1; min-width:160px; background:var(--surface); border:1px solid var(--border);
      border-radius:7px; padding:10px 14px; color:var(--text);
      font-family:'Rajdhani',sans-serif; font-size:14px; outline:none;
    }
    .filter-bar input:focus { border-color:var(--blue); }
    .filter-bar input::placeholder { color:var(--text-dim); }
    .filter-btn {
      padding:10px 18px; border-radius:7px; border:1px solid var(--border);
      background:var(--surface); color:var(--text-dim);
      font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600; letter-spacing:1px; cursor:pointer; transition:all .2s;
    }
    .filter-btn.active { border-color:var(--blue); color:var(--blue); background:rgba(0,195,255,0.08); }

    .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    table { width:100%; border-collapse:collapse; }
    thead tr { background:var(--surface2); border-bottom:1px solid var(--border); }
    th { padding:14px 20px; text-align:left; font-family:'Orbitron',monospace; font-size:10px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; }
    tbody tr { border-bottom:1px solid rgba(0,195,255,0.06); transition:background .15s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:rgba(0,195,255,0.04); }
    td { padding:14px 20px; font-size:15px; font-weight:600; }

    .user-name { display:flex; align-items:center; gap:10px; }
    .avatar {
      width:32px; height:32px; border-radius:50%;
      background:linear-gradient(135deg,var(--blue-dim),var(--blue));
      display:flex; align-items:center; justify-content:center;
      font-family:'Orbitron',monospace; font-size:11px; font-weight:700; color:#000; flex-shrink:0;
    }
    .badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
    .badge-white { background:rgba(0,195,255,0.12); color:var(--blue); border:1px solid rgba(0,195,255,0.3); }
    .badge-block { background:rgba(255,68,102,0.1); color:var(--red); border:1px solid rgba(255,68,102,0.25); }
    .dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
    .dot-green { background:var(--green); box-shadow:0 0 6px var(--green); }
    .dot-red   { background:var(--red); box-shadow:0 0 6px var(--red); }
    .actions { display:flex; gap:8px; }

    .empty { text-align:center; padding:60px 20px; color:var(--text-dim); }
    .empty-icon { font-size:40px; margin-bottom:12px; opacity:.4; }
    .empty-text { font-size:14px; letter-spacing:2px; text-transform:uppercase; }

    .spinner {
      display:inline-block; width:18px; height:18px;
      border:2px solid rgba(0,195,255,0.2); border-top-color:var(--blue);
      border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:6px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    #toast {
      position:fixed; bottom:30px; right:30px; padding:14px 22px;
      background:var(--surface2); border:1px solid var(--blue); border-radius:8px;
      color:var(--blue); font-family:'Orbitron',monospace; font-size:11px; letter-spacing:2px;
      box-shadow:0 0 20px var(--blue-glow); z-index:999;
      transform:translateY(80px); opacity:0; transition:all .3s;
    }
    #toast.show { transform:translateY(0); opacity:1; }
    #toast.error { border-color:var(--red); color:var(--red); box-shadow:0 0 20px rgba(255,68,102,0.3); }

    .section-label { font-family:'Orbitron',monospace; font-size:11px; letter-spacing:3px; color:var(--text-dim); text-transform:uppercase; margin-bottom:10px; padding-left:4px; }
    .api-info {
      background:var(--surface2); border:1px solid rgba(0,195,255,0.1); border-radius:8px;
      padding:12px 18px; margin-bottom:28px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    }
    .api-label { font-family:'Orbitron',monospace; font-size:10px; color:var(--text-dim); letter-spacing:2px; }
    .api-url {
      font-family:'Courier New',monospace; font-size:13px; color:var(--green);
      background:rgba(0,255,170,0.06); padding:4px 10px; border-radius:4px; border:1px solid rgba(0,255,170,0.15);
    }
    @media (max-width:600px) { th:nth-child(3),td:nth-child(3) { display:none; } }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo"><span>User</span> Auto <span>Joiner</span></div>
    <div class="subtitle">Painel de Administração · Whitelist Manager</div>
    <div class="divider"></div>
  </header>

  <div class="stats">
    <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total Users</div></div>
    <div class="stat-card"><div class="stat-num green" id="stat-white">—</div><div class="stat-label">Whitelisted</div></div>
    <div class="stat-card"><div class="stat-num red" id="stat-block">—</div><div class="stat-label">Blocked</div></div>
  </div>

  <div class="api-info">
    <span class="api-label">API ENDPOINT</span>
    <span class="api-url">GET /users</span>
    <span class="api-label" id="api-status" style="margin-left:auto;color:var(--text-dim);">● Conectando...</span>
  </div>

  <div class="section-label">Adicionar Usuário</div>
  <div class="add-section">
    <input type="text" id="input-name" placeholder="Nome do usuário Roblox..." maxlength="50"/>
    <button class="btn btn-primary" id="btn-add" onclick="addUser()">+ Adicionar</button>
  </div>

  <div class="filter-bar">
    <input type="text" id="search" placeholder="Buscar usuário..." oninput="renderTable()"/>
    <button class="filter-btn active" id="f-all"   onclick="setFilter('all')">Todos</button>
    <button class="filter-btn"        id="f-white" onclick="setFilter('white')">Whitelist</button>
    <button class="filter-btn"        id="f-block" onclick="setFilter('block')">Bloqueados</button>
  </div>

  <div class="section-label">Usuários Cadastrados</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>#</th><th>Usuário</th><th>Adicionado em</th><th>Status</th><th>Ações</th></tr></thead>
      <tbody id="user-tbody"></tbody>
    </table>
    <div class="empty" id="empty-state">
      <div class="empty-icon"><span class="spinner"></span></div>
      <div class="empty-text">Carregando...</div>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
  let users  = [];
  let filter = 'all';

  async function api(method, path, body) {
    const opts = { method, headers: {'Content-Type':'application/json'} };
    if (body) opts.body = JSON.stringify(body);
    const res  = await fetch(path, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro na requisição');
    return data;
  }

  async function loadUsers() {
    try {
      const data = await api('GET', '/users');
      users = data.users || [];
      document.getElementById('api-status').textContent = '● LIVE';
      document.getElementById('api-status').style.color = 'var(--green)';
      updateStats(); renderTable();
    } catch {
      document.getElementById('api-status').textContent = '● OFFLINE';
      document.getElementById('api-status').style.color = 'var(--red)';
      showEmpty('Erro ao conectar com o servidor');
    }
  }

  async function addUser() {
    const inp  = document.getElementById('input-name');
    const btn  = document.getElementById('btn-add');
    const name = inp.value.trim();
    if (!name) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Adicionando...';
    try {
      const data = await api('POST', '/users', { username: name });
      users.push(data.user);
      inp.value = '';
      updateStats(); renderTable();
      toast('Usuário adicionado ✓');
    } catch (e) { toast(e.message, true); }
    finally { btn.disabled = false; btn.innerHTML = '+ Adicionar'; }
  }

  async function toggleUser(id) {
    try {
      const data = await api('PATCH', `/users/${id}`, {});
      const idx  = users.findIndex(u => u.id === id);
      if (idx !== -1) users[idx] = data.user;
      updateStats(); renderTable();
      toast(data.user.whitelisted ? 'Adicionado à whitelist ✓' : 'Removido da whitelist ✗');
    } catch (e) { toast(e.message, true); }
  }

  async function deleteUser(id) {
    try {
      await api('DELETE', `/users/${id}`);
      users = users.filter(u => u.id !== id);
      updateStats(); renderTable();
      toast('Usuário removido');
    } catch (e) { toast(e.message, true); }
  }

  function setFilter(f) {
    filter = f;
    ['all','white','block'].forEach(k =>
      document.getElementById('f-'+k).classList.toggle('active', k === f)
    );
    renderTable();
  }

  function renderTable() {
    const search = document.getElementById('search').value.toLowerCase();
    let list = users.filter(u => u.username.toLowerCase().includes(search));
    if (filter === 'white') list = list.filter(u =>  u.whitelisted);
    if (filter === 'block') list = list.filter(u => !u.whitelisted);

    const tbody = document.getElementById('user-tbody');
    const empty = document.getElementById('empty-state');
    if (!list.length) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      empty.innerHTML = '<div class="empty-icon">◈</div><div class="empty-text">Nenhum usuário encontrado</div>';
      return;
    }
    empty.style.display = 'none';
    tbody.innerHTML = list.map((u, i) => {
      const date = u.addedAt ? new Date(u.addedAt).toLocaleDateString('pt-BR') : '—';
      return `<tr>
        <td style="color:var(--text-dim);font-family:'Orbitron',monospace;font-size:12px;">${String(i+1).padStart(2,'0')}</td>
        <td><div class="user-name"><div class="avatar">${u.username.charAt(0).toUpperCase()}</div><span>${u.username}</span></div></td>
        <td style="color:var(--text-dim);font-size:13px;">${date}</td>
        <td>${u.whitelisted
          ? `<span class="badge badge-white"><span class="dot dot-green"></span>Whitelist</span>`
          : `<span class="badge badge-block"><span class="dot dot-red"></span>Bloqueado</span>`}</td>
        <td><div class="actions">
          <button class="btn btn-toggle ${u.whitelisted?'':'blocked'}" onclick="toggleUser(${u.id})">${u.whitelisted?'BLOQUEAR':'LIBERAR'}</button>
          <button class="btn btn-danger" onclick="deleteUser(${u.id})">DEL</button>
        </div></td>
      </tr>`;
    }).join('');
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = users.length;
    document.getElementById('stat-white').textContent = users.filter(u =>  u.whitelisted).length;
    document.getElementById('stat-block').textContent = users.filter(u => !u.whitelisted).length;
  }

  function showEmpty(msg) {
    document.getElementById('user-tbody').innerHTML = '';
    const e = document.getElementById('empty-state');
    e.style.display = 'block';
    e.innerHTML = `<div class="empty-icon">⚠</div><div class="empty-text">${msg}</div>`;
  }

  function toast(msg, error = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (error ? ' error' : '');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.className = '', 2800);
  }

  document.getElementById('input-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') addUser();
  });

  loadUsers();
  setInterval(loadUsers, 30000);
</script>
</body>
</html>
